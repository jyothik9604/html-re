<!DOCTYPE html>
<html>
<head>
    <title>Registration Form</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; padding: 20px; }
        .form-container { width: 350px; border: 1px solid #ccc; padding: 20px; border-radius: 10px; box-shadow: 2px 2px 10px #eee; }
        
        label { font-weight: bold; display: block; margin-top: 10px; }
        input[type="text"], input[type="password"] {
            width: 100%; padding: 8px; margin-top: 5px; box-sizing: border-box;
        }
        
        .error { color: red; font-size: 13px; margin-top: 2px; display: block; min-height: 16px; }
        .success { color: green; font-size: 13px; }
        
        .gender-container { margin-top: 5px; }
        button { width: 100%; padding: 10px; margin-top: 20px; background-color: #007bff; color: white; border: none; cursor: pointer; border-radius: 5px; }
        button:hover { background-color: #0056b3; }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Join Us</h2>
    <form onsubmit="return validateForm()">
        <label>First Name:</label>
        <input type="text" id="firstName" placeholder="enter first name">
        <span id="fNameError" class="error"></span>

        <label>Last Name:</label>
        <input type="text" id="lastName" placeholder="enter last name">
        <span id="lNameError" class="error"></span>

        <label>Gender:</label>
        <div class="gender-container">
            <input type="radio" name="gender" value="Male"> Male
            <input type="radio" name="gender" value="Female"> Female
        </div>
        <span id="genderError" class="error"></span>

        <label>Password:</label>
        <input type="password" id="password" placeholder="Must be 6 characters">
        <span id="passError" class="error"></span>

        <button type="submit">Submit</button>
    </form>
</div>

<script>
function validateForm() {
    let isValid = true;

    // 1. Get Values
    const fName = document.getElementById("firstName").value.trim();
    const lName = document.getElementById("lastName").value.trim();
    const pass = document.getElementById("password").value;
    const genderOptions = document.getElementsByName("gender");

    // 2. Clear previous error messages
    const errors = document.querySelectorAll(".error");
    errors.forEach(err => err.innerHTML = "");

    // 3. First Name Validation (2-20 characters)
    if (fName.length < 2 || fName.length > 20) {
        document.getElementById("fNameError").innerHTML = "Must be between 2 and 20 characters";
        isValid = false;
    }

    // 4. Last Name Validation (2-20 characters)
    if (lName.length < 2 || lName.length > 20) {
        document.getElementById("lNameError").innerHTML = "Must be between 2 and 20 characters";
        isValid = false;
    }

    // 5. Gender Validation
    let genderSelected = false;
    for (let i = 0; i < genderOptions.length; i++) {
        if (genderOptions[i].checked) {
            genderSelected = true;
            break;
        }
    }
    if (!genderSelected) {
        document.getElementById("genderError").innerHTML = "Please select a gender";
        isValid = false;
    }

    // 6. Password Validation (Exactly 6 characters)
    if (pass.length !== 6) {
        document.getElementById("passError").innerHTML = "Password must be exactly 6 characters";
        isValid = false;
    }

    // Only submits if isValid remains true
    if (isValid) {
        alert("Registration Successful!");
    }
    return isValid;
}
</script>

</body>
</html>
